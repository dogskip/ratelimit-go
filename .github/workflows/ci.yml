name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 주 1회 보안 스캔 (월요일 09:00 UTC).
    - cron: '0 9 * * 1'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt found issues:"
            gofmt -d .
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: Test with race detector
        run: go test -race -count=1 ./...
      - name: Build
        run: go build ./...

  security-scan:
    runs-on: ubuntu-latest
    # govulncheck로 알려진 취약점이 있는 표준 라이브러리/의존성 스캔.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
