name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: gofmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "gofmt found issues:"
            gofmt -d .
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: Test with race detector
        run: go test -race -count=1 ./...
      - name: Build
        run: go build ./...
